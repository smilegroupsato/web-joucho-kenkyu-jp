name: Deploy to Lolipop FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build site tree and deploy website
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Test SGOS site tree generator
        run: python -m unittest discover -s tests -v

      - name: Build SGOS site tree
        run: python scripts/build_sgos_site_tree.py

      - name: Validate generated JSON
        run: python -m json.tool site/sgos-site-tree.json > /dev/null

      - name: Sync files to Lolipop
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets['FTP_SERVER'] }}
          username: ${{ secrets['FTP_USERNAME'] }}
          password: ${{ secrets['FTP_PASSWORD'] }}
          server-dir: ${{ secrets['FTP_SERVER_DIR'] }}
          local-dir: ./site/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**
            README.md
